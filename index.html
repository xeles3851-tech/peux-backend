<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peux Hesap Oluşturucu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; overflow-x: hidden; color: #e0e0e0; font-family: 'Inter', sans-serif; }
    .background-shapes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
    .shape { position: absolute; background: rgba(255,255,255,0.05); border-radius: 50%; filter: blur(20px); }
    .glow-button { position: relative; overflow: hidden; transition: all 0.3s ease; }
    .glow-button::before { content: ''; position: absolute; top: 50%; left: 50%; width: 300%; height: 300%; background: radial-gradient(circle, rgba(255,255,255,0.3), transparent); transform: translate(-50%, -50%) scale(0); transition: transform 0.5s ease; }
    .glow-button:hover::before { transform: translate(-50%, -50%) scale(1); }
    .glow-button:hover { box-shadow: 0 0 25px rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="background-shapes">
    <div class="shape" style="width:200px;height:200px;top:10%;left:20%;"></div>
    <div class="shape" style="width:150px;height:150px;top:60%;left:70%;"></div>
    <div class="shape" style="width:100px;height:100px;top:30%;left:50%;"></div>
  </div>

  <div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4">
    <h1 class="text-4xl font-bold mb-8 text-white animate-pulse">Peux Hesap Oluşturucu</h1>

    <div class="w-full max-w-md bg-gray-900 bg-opacity-50 p-8 rounded-lg shadow-lg backdrop-blur-md">
      <div class="mb-6">
        <label for="accountCount" class="block text-sm font-medium mb-2">Kaç Adet Hesap Oluşturulacak?</label>
        <input type="number" id="accountCount" min="1" value="10" class="w-full px-4 py-2 bg-gray-800 text-white border border-gray-700 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button id="startButton" class="glow-button w-full px-4 py-3 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 text-lg">🚀 Hesapları Oluştur</button>
    </div>

    <div id="results" class="w-full max-w-4xl mt-12">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-semibold text-white">Oluşturulan Hesaplar</h2>
        <button id="downloadBtn" class="glow-button px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-md flex items-center gap-2">TXT İndir</button>
      </div>
      <div class="overflow-x-auto">
        <table id="resultTable" class="result-table w-full text-sm">
          <thead><tr><th>#</th><th>Kullanıcı Adı</th><th>Şifre</th><th>Doğum Tarihi</th><th>E-posta</th><th>Doğrulayıcı</th></tr></thead>
          <tbody id="resultList"></tbody>
        </table>
      </div>
    </div>
    <div id="status" class="mt-4 text-center text-lg font-medium"></div>
  </div>

  <script>
    gsap.to(".shape", { x: () => Math.random()*200-100, y: () => Math.random()*200-100, scale: () => Math.random()*0.5+0.75, rotation: 360, repeat: -1, yoyo: true, duration: () => Math.random()*3+2, ease: "sine.inOut", stagger: 0.5 });

    const API_URL = 'https://peux-backend-production.up.railway.app';   // ← BURASI GÜNCELLENDİ

    // ... (geri kalan script tamamen aynı, önceki mesajımdaki uzun script'i buraya yapıştırıyorum)

    const startButton = document.getElementById('startButton');
    const accountCountInput = document.getElementById('accountCount');
    const statusDiv = document.getElementById('status');
    const resultList = document.getElementById('resultList');
    const downloadBtn = document.getElementById('downloadBtn');

    let accountCounter = 0;
    let accounts = [];
    let usedUsernames = new Set();

    function generateRandom6Digit() {
      return String(Math.floor(100000 + Math.random() * 900000));
    }

    function generateUniqueUsername() {
      let username, attempts = 0;
      do {
        username = `xeles${generateRandom6Digit()}`;
        attempts++;
        if (attempts > 100) { username = `xeles${Date.now().toString().slice(-6)}`; break; }
      } while (usedUsernames.has(username));
      usedUsernames.add(username);
      return username;
    }

    downloadBtn.addEventListener('click', () => {
      if (accounts.length === 0) return alert('Henüz hesap yok!');
      const txt = accounts.map(a => `${a.username}:${a.password}`).join('\n');
      const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `peux_hesaplar_${new Date().toISOString().slice(0,10)}.txt`;
      a.click(); URL.revokeObjectURL(url);
      downloadBtn.textContent = '✅ İndirildi!';
      setTimeout(() => downloadBtn.innerHTML = 'TXT İndir', 2000);
    });

    startButton.addEventListener('click', async () => {
      const count = parseInt(accountCountInput.value);
      if (!count || count < 1) return alert('Geçerli sayı gir!');

      startButton.disabled = true;
      statusDiv.textContent = 'Hesaplar oluşturuluyor...';
      resultList.innerHTML = '';
      accountCounter = 0;
      accounts = [];
      usedUsernames.clear();

      try {
        for (let i = 0; i < count; i++) {
          await createAndPollAccount();
        }
        statusDiv.innerHTML = `✅ <span class="text-emerald-400">${count} hesap başarıyla oluşturuldu!</span>`;
      } catch (e) {
        statusDiv.textContent = `❌ Hata: ${e.message}`;
      } finally {
        startButton.disabled = false;
      }
    });

    async function createAndPollAccount() {
      const generatedUsername = generateUniqueUsername();
      const res = await fetch(`${API_URL}/create-account`, { method: 'GET', headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error('API hatası');
      const { task_id } = await res.json();
      await pollTaskStatus(task_id, generatedUsername);
    }

    async function pollTaskStatus(taskId, generatedUsername) {
      while (true) {
        const res = await fetch(`${API_URL}/task/${taskId}`, { method: 'GET', headers: { 'Accept': 'application/json' } });
        if (res.status === 200) {
          const data = await res.json();
          if (data.status === 'success' && data.account_info) {
            const account = { ...data.account_info };
            account.username = generatedUsername;
            addAccountToTable(account);
            return;
          }
          if (data.status === 'failed') throw new Error(data.error || 'Başarısız');
        }
        await new Promise(r => setTimeout(r, 1500));
      }
    }

    function addAccountToTable(account) {
      accountCounter++;
      accounts.push(account);
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${accountCounter}</td>
        <td class="font-mono">${account.username}</td>
        <td class="font-mono">${account.password}
          <button class="copy-btn ml-2 px-3 py-1 text-xs bg-blue-600 rounded" data-copy="${account.password}">Kopyala</button>
        </td>
        <td>${account.dob || '-'}</td>
        <td class="font-mono">${account.email || '-'}</td>
        <td>Fony</td>
      `;
      resultList.appendChild(row);
      gsap.from(row, { opacity: 0, y: 30, duration: 0.5, ease: 'power2.out' });

      row.querySelector('.copy-btn').addEventListener('click', function() {
        navigator.clipboard.writeText(this.dataset.copy).then(() => {
          this.textContent = 'Kopyalandı ✓';
          setTimeout(() => this.textContent = 'Kopyala', 1800);
        });
      });
    }
  </script>
</body>
</html>
